version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=/app/data/a11yscope.db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-me-in-production
      - SMTP_HOST=
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
    volumes:
      - a11yscope_data:/app/data
    restart: unless-stopped
volumes:
  a11yscope_data:
